<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Token Compressor Pro</title>
    <style>
        :root {
            --bg: #1e1e2e;
            --surface1: #181825;
            --surface2: #313244;
            --text: #cdd6f4;
            --subtext: #a6adc8;
            --primary: #cba6f7;
            --primary-hover: #b4befe;
            --success: #a6e3a1;
            --warning: #f9e2af;
            --border: #45475a;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--surface1);
            color: var(--text);
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.5;
        }

        h1 { text-align: center; color: var(--primary); margin-bottom: 5px; }
        p.subtitle { text-align: center; color: var(--subtext); margin-top: 0; margin-bottom: 30px; }

        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: var(--surface2);
            padding: 15px 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        select {
            background-color: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            outline: none;
        }

        select:focus { border-color: var(--primary); }

        .workspace {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .panel { display: flex; flex-direction: column; gap: 8px; }
        
        .panel-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            color: var(--primary);
        }

        textarea {
            width: 100%;
            height: 250px;
            background-color: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            resize: vertical;
            box-sizing: border-box;
            outline: none;
        }

        #compressedOutput { color: var(--success); }
        textarea:focus { border-color: var(--primary); }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--subtext);
        }

        .savings-banner {
            background: var(--surface2);
            color: var(--warning);
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.2em;
            font-weight: bold;
            border: 1px solid var(--border);
        }

        .actions { text-align: right; margin-top: 10px; }

        button {
            background-color: var(--primary);
            color: var(--bg);
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover { background-color: var(--primary-hover); transform: translateY(-1px); }
        button:active { transform: translateY(1px); }

    </style>
</head>
<body>

    <h1>Token Compressor Pro</h1>
    <p class="subtitle">Safely minify context for LLM prompts.</p>
    
    <div class="header-controls">
        <label for="modeSelect"><strong>Compression Mode:</strong></label>
        <select id="modeSelect">
            <option value="text">Conversational Text</option>
            <option value="html">HTML</option>
            <option value="css">CSS</option>
            <option value="python">Python</option>
        </select>
    </div>

    <div class="workspace">
        <div class="panel">
            <div class="panel-header">
                <span>Raw Input</span>
            </div>
            <textarea id="rawInput" placeholder="Paste your code or text here..."></textarea>
            <div class="stats-bar">
                <span id="rawChars">Chars: 0</span>
                <span id="rawTokens">Est. Tokens: 0</span>
            </div>
        </div>

        <div class="savings-banner" id="savingsDisplay">0% Tokens Saved</div>

        <div class="panel">
            <div class="panel-header">
                <span>LLM-Ready Output</span>
            </div>
            <textarea id="compressedOutput" readonly placeholder="Compressed result will appear here..."></textarea>
            <div class="stats-bar">
                <span id="compChars">Chars: 0</span>
                <span id="compTokens">Est. Tokens: 0</span>
            </div>
            <div class="actions">
                <button id="copyBtn">Copy Compressed Output</button>
            </div>
        </div>
    </div>

    <script>
        const DOM = {
            input: document.getElementById('rawInput'),
            output: document.getElementById('compressedOutput'),
            mode: document.getElementById('modeSelect'),
            rawChars: document.getElementById('rawChars'),
            rawTokens: document.getElementById('rawTokens'),
            compChars: document.getElementById('compChars'),
            compTokens: document.getElementById('compTokens'),
            savings: document.getElementById('savingsDisplay'),
            copyBtn: document.getElementById('copyBtn')
        };

        // Dictionaries for Text Mode
        const FILLERS = ["can you please", "could you", "i would like to", "i want to", "please", "i was wondering if", "would you mind"];
        const STOPWORDS = [" a ", " an ", " the ", " basically ", " actually ", " just ", " very ", " really "];

        function compress() {
            const rawText = DOM.input.value;
            const mode = DOM.mode.value;

            // Handle empty state
            if (!rawText.trim()) {
                DOM.output.value = "";
                updateMetrics(0, 0);
                return;
            }

            let result = rawText;

            try {
                switch(mode) {
                    case 'text':
                        // Remove conversational fillers
                        FILLERS.forEach(f => {
                            result = result.replace(new RegExp(f, 'gi'), '');
                        });
                        // Remove common stop words
                        STOPWORDS.forEach(w => {
                            result = result.replace(new RegExp(w, 'gi'), ' ');
                        });
                        // Collapse multiple spaces and newlines
                        result = result.replace(/[ \t]{2,}/g, ' ')
                                       .replace(/\n{3,}/g, '\n\n')
                                       .trim();
                        break;

                    case 'html':
                        // Strip result = result.replace(//g, '');
                        // Remove leading whitespace on each line
                        result = result.replace(/^[ \t]+/gm, '');
                        // Collapse multiple newlines into one
                        result = result.replace(/\n{2,}/g, '\n');
                        // Collapse tag spacing
                        result = result.replace(/>\s+</g, '><');
                        result = result.trim();
                        break;

                    case 'css':
                        // Strip /* comments */
                        result = result.replace(/\/\*[\s\S]*?\*\//g, '');
                        // Convert newlines and tabs to spaces
                        result = result.replace(/[\n\r\t]/g, ' ');
                        // Collapse multiple spaces
                        result = result.replace(/\s{2,}/g, ' ');
                        // Remove spaces around syntax characters
                        result = result.replace(/\s*([{}:;,>+~])\s*/g, '$1');
                        result = result.trim();
                        break;

                    case 'python':
                        // Strip full-line comments (lines starting with optional whitespace then #)
                        result = result.replace(/^[ \t]*#.*(\n|$)/gm, '');
                        // Strip trailing whitespace from ends of lines
                        result = result.replace(/[ \t]+$/gm, '');
                        // Collapse 3+ newlines down to 2
                        result = result.replace(/\n{3,}/g, '\n\n');
                        result = result.trim();
                        break;
                }

                DOM.output.value = result;
                updateMetrics(rawText.length, result.length);

            } catch (err) {
                console.error("Compression failed:", err);
                DOM.output.value = "Error during compression. Check console.";
            }
        }

        function updateMetrics(rawLength, compLength) {
            // Rough LLM token estimation (4 chars per token)
            const rTokens = Math.ceil(rawLength / 4);
            const cTokens = Math.ceil(compLength / 4);

            DOM.rawChars.textContent = `Chars: ${rawLength}`;
            DOM.rawTokens.textContent = `Est. Tokens: ${rTokens}`;
            
            DOM.compChars.textContent = `Chars: ${compLength}`;
            DOM.compTokens.textContent = `Est. Tokens: ${cTokens}`;

            if (rTokens > 0) {
                const percentSaved = (((rTokens - cTokens) / rTokens) * 100).toFixed(1);
                DOM.savings.textContent = `${percentSaved}% Tokens Saved`;
            } else {
                DOM.savings.textContent = `0% Tokens Saved`;
            }
        }

        async function copyToClipboard() {
            const textToCopy = DOM.output.value;
            if (!textToCopy) return;

            try {
                await navigator.clipboard.writeText(textToCopy);
                const originalText = DOM.copyBtn.textContent;
                DOM.copyBtn.textContent = "Copied!";
                DOM.copyBtn.style.backgroundColor = "var(--success)";
                DOM.copyBtn.style.color = "var(--surface1)";
                
                setTimeout(() => {
                    DOM.copyBtn.textContent = originalText;
                    DOM.copyBtn.style.backgroundColor = "var(--primary)";
                    DOM.copyBtn.style.color = "var(--bg)";
                }, 2000);
            } catch (err) {
                alert("Clipboard access denied. Please copy manually.");
            }
        }

        // Attach Event Listeners
        DOM.input.addEventListener('input', compress);
        DOM.mode.addEventListener('change', compress);
        DOM.copyBtn.addEventListener('click', copyToClipboard);

        // Initialize state
        compress();

    </script>
</body>
</html>
