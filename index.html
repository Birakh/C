<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Token Compressor (Code & Text)</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #181825;
            color: #cdd6f4;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 { text-align: center; color: #cba6f7; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #a6adc8; margin-top: 0; margin-bottom: 30px; }
        .controls { display: flex; justify-content: space-between; margin-bottom: 15px; align-items: center; }
        select {
            background-color: #313244; color: #cdd6f4; border: 1px solid #45475a;
            padding: 10px; border-radius: 6px; font-size: 16px; cursor: pointer;
        }
        .container { display: flex; flex-direction: column; gap: 20px; }
        textarea {
            width: 100%; height: 200px; background-color: #1e1e2e; color: #a6e3a1;
            border: 1px solid #45475a; border-radius: 8px; padding: 12px;
            font-family: monospace; font-size: 14px; resize: vertical; box-sizing: border-box;
        }
        textarea:focus { outline: none; border-color: #cba6f7; }
        .stats { display: flex; justify-content: space-between; font-size: 14px; color: #a6adc8; margin-top: 5px; }
        .btn-container { text-align: right; }
        button {
            background-color: #cba6f7; color: #11111b; border: none;
            padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s;
        }
        button:hover { background-color: #b4befe; }
        .savings { color: #f9e2af; font-weight: bold; text-align: center; font-size: 1.3em; padding: 10px; background: #313244; border-radius: 8px;}
    </style>
</head>
<body>

    <h1>Token Compressor Pro</h1>
    <p class="subtitle">Safely minify Text, HTML, CSS, and Python for LLM context windows.</p>
    
    <div class="controls">
        <label for="modeSelect"><strong>Select Compression Mode:</strong></label>
        <select id="modeSelect" onchange="processText()">
            <option value="text">Conversational Text</option>
            <option value="html">HTML</option>
            <option value="css">CSS</option>
            <option value="python">Python</option>
        </select>
    </div>

    <div class="container">
        <div>
            <textarea id="rawInput" placeholder="Paste your raw code or text here..."></textarea>
            <div class="stats">
                <span id="rawChars">Chars: 0</span>
                <span id="rawTokens">Est. Tokens: 0</span>
            </div>
        </div>

        <div class="savings" id="savingsDisplay">0% Tokens Saved</div>

        <div>
            <textarea id="compressedOutput" readonly placeholder="LLM-ready output will appear here..."></textarea>
            <div class="stats">
                <span id="compChars">Chars: 0</span>
                <span id="compTokens">Est. Tokens: 0</span>
            </div>
        </div>

        <div class="btn-container">
            <button onclick="copyText()">Copy to Clipboard</button>
        </div>
    </div>

    <script>
        const rawInput = document.getElementById('rawInput');
        const compressedOutput = document.getElementById('compressedOutput');
        const modeSelect = document.getElementById('modeSelect');
        
        const fillers = ["can you please", "could you", "i would like to", "i want to", "please", "i was wondering if"];
        const stopWords = [" a ", " an ", " the ", " basically ", " actually "];

        function processText() {
            let text = rawInput.value;
            const mode = modeSelect.value;

            if (text.trim() === "") {
                compressedOutput.value = "";
                updateStats();
                return;
            }

            if (mode === "text") {
                // TEXT MODE: Remove fluff
                let lowerText = text.toLowerCase();
                fillers.forEach(phrase => text = text.replace(new RegExp(phrase, "gi"), ""));
                stopWords.forEach(word => text = text.replace(new RegExp(word, "gi"), " "));
                text = text.replace(/\s{2,}/g, ' ').replace(/\n{3,}/g, '\n\n').trim();
            
            } else if (mode === "html") {
                // HTML MODE: Safe minification
                text = text.replace(//g, ''); // Remove comments
                text = text.replace(/^[ \t]+/gm, ''); // Remove leading indentation
                text = text.replace(/\n{2,}/g, '\n'); // Remove empty lines
                text = text.replace(/>\s+</g, '><'); // Remove spaces between tags
                text = text.trim();

            } else if (mode === "css") {
                // CSS MODE: Aggressive minification
                text = text.replace(/\/\*[\s\S]*?\*\//g, ''); // Remove comments
                text = text.replace(/\n/g, ''); // Remove line breaks
                text = text.replace(/\s+/g, ' '); // Collapse spaces
                text = text.replace(/\s*([{}:;,])\s*/g, '$1'); // Remove spaces around syntax
                text = text.trim();

            } else if (mode === "python") {
                // PYTHON MODE: Strict whitespace preservation, remove comments/blank lines
                text = text.replace(/^[ \t]*#.*$/gm, ''); // Remove whole-line comments safely
                text = text.replace(/\n{2,}/g, '\n'); // Collapse multiple blank lines to one
                text = text.trim();
            }

            compressedOutput.value = text;
            updateStats();
        }

        function updateStats() {
            const rawText = rawInput.value;
            const compText = compressedOutput.value;

            const rawTokens = Math.ceil(rawText.length / 4);
            const compTokens = Math.ceil(compText.length / 4);

            document.getElementById('rawChars').innerText = `Chars: ${rawText.length}`;
            document.getElementById('rawTokens').innerText = `Est. Tokens: ${rawTokens}`;
            
            document.getElementById('compChars').innerText = `Chars: ${compText.length}`;
            document.getElementById('compTokens').innerText = `Est. Tokens: ${compTokens}`;

            if (rawTokens > 0) {
                const saved = ((rawTokens - compTokens) / rawTokens * 100).toFixed(1);
                document.getElementById('savingsDisplay').innerText = `${saved}% Tokens Saved`;
            } else {
                document.getElementById('savingsDisplay').innerText = `0% Tokens Saved`;
            }
        }

        function copyText() {
            compressedOutput.select();
            document.execCommand('copy');
            alert("Copied to clipboard! Ready for the LLM.");
        }

        rawInput.addEventListener('input', processText);
    </script>
</body>
</html>
